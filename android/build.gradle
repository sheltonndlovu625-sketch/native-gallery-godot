plugins {
    id 'com.android.library'
}

android {
    namespace 'org.godotengine.plugin.nativegallery'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 34
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    compileOnly files('libs/godot-lib.aar')
}
