name: Build GDExtension

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            target: template_release
          - platform: windows
            os: windows-latest
            target: template_release
          - platform: macos
            os: macos-latest
            target: template_release
          - platform: android
            os: ubuntu-22.04
            target: template_release
            arch: arm64
          - platform: android
            os: ubuntu-22.04
            target: template_release
            arch: arm32
          - platform: android
            os: ubuntu-22.04
            target: template_release
            arch: x86_64
          - platform: ios
            os: macos-latest
            target: template_release

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone godot-cpp
        run: |
          git clone --depth 1 --branch 4.2 https://github.com/godotengine/godot-cpp.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup SCons
        run: pip install scons

      - name: Setup Android NDK
        if: matrix.platform == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r23c
          link-to-sdk: true

      - name: Build godot-cpp
        shell: bash
        run: |
          cd godot-cpp
          if [ -n "${{ matrix.arch }}" ]; then
            scons platform=${{ matrix.platform }} target=${{ matrix.target }} arch=${{ matrix.arch }} -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
          else
            scons platform=${{ matrix.platform }} target=${{ matrix.target }} -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
          fi

      - name: Build extension
        shell: bash
        run: |
          if [ -n "${{ matrix.arch }}" ]; then
            scons platform=${{ matrix.platform }} target=${{ matrix.target }} arch=${{ matrix.arch }} -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
          else
            scons platform=${{ matrix.platform }} target=${{ matrix.target }} -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native_gallery-${{ matrix.platform }}-${{ matrix.arch || 'universal' }}-${{ matrix.target }}
          path: demo/bin/*
