name: Build GDExtension

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            target: template_release
          - platform: windows
            os: windows-latest
            target: template_release
          - platform: macos
            os: macos-latest
            target: template_release
          - platform: android
            os: ubuntu-22.04
            target: template_release
            arch: arm64
          - platform: android
            os: ubuntu-22.04
            target: template_release
            arch: arm32
          - platform: android
            os: ubuntu-22.04
            target: template_release
            arch: x86_64
          - platform: ios
            os: macos-latest
            target: template_release

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone godot-cpp
        run: |
          git clone --depth 1 --branch 4.2 https://github.com/godotengine/godot-cpp.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup SCons
        run: pip install scons

      - name: Setup Android NDK
        if: matrix.platform == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r23c
          link-to-sdk: true

      - name: Build godot-cpp
        shell: bash
        run: |
          cd godot-cpp
          if [ -n "${{ matrix.arch }}" ]; then
            scons platform=${{ matrix.platform }} target=${{ matrix.target }} arch=${{ matrix.arch }} -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
          else
            scons platform=${{ matrix.platform }} target=${{ matrix.target }} -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
          fi

      - name: Build extension
        shell: bash
        run: |
          if [ -n "${{ matrix.arch }}" ]; then
            scons platform=${{ matrix.platform }} target=${{ matrix.target }} arch=${{ matrix.arch }} -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
          else
            scons platform=${{ matrix.platform }} target=${{ matrix.target }} -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
          fi

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: native_gallery-${{ matrix.platform }}-${{ matrix.arch || 'universal' }}-${{ matrix.target }}
          path: demo/bin/*

  build-android-plugin:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Download Godot Android library
        run: |
          mkdir -p android/libs
          wget -q https://downloads.tuxfamily.org/godotengine/4.2.0/Godot_v4.2.0-stable_export_templates.tpz -O templates.tpz
          unzip -q templates.tpz -d templates
          unzip -q templates/android_source.zip -d android_source
          cp android_source/libs/godot-lib.aar android/libs/

      - name: Build AAR with Gradle
        run: |
          cd android
          gradle wrapper --gradle-version 8.4
          ./gradlew assembleRelease

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: NativeGalleryAndroid-aar
          path: android/build/outputs/aar/*.aar
