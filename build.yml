name: Build GDExtension

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-20.04
            target: template_release
          - platform: windows
            os: windows-latest
            target: template_release
          - platform: macos
            os: macos-latest
            target: template_release
          - platform: android
            os: ubuntu-20.04
            target: template_release
          - platform: ios
            os: macos-latest
            target: template_release

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup SCons
        run: pip install scons

      - name: Setup Android NDK
        if: matrix.platform == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r23c
          link-to-sdk: true

      - name: Build godot-cpp
        shell: bash
        run: |
          cd godot-cpp
          scons platform=${{ matrix.platform }} target=${{ matrix.target }} -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)

      - name: Build extension
        shell: bash
        run: |
          scons platform=${{ matrix.platform }} target=${{ matrix.target }} -j$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native_gallery-${{ matrix.platform }}-${{ matrix.target }}
          path: demo/bin/*
